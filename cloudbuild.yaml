- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    [
      'run','deploy','hello-app',
      '--image','us-east1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/hello-app:latest',
      '--region','us-east1',
      '--platform','managed',
      '--allow-unauthenticated'
    ]

images:
- 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/hello-app'

options:
  logging: CLOUD_LOGGING_ONLY